<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Cloudflare Stream Choice Game</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #000;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
      background: #000;
    }

    #playerContainer {
      position: absolute;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
      overflow: hidden;
    }

    #playerContainer iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: #000;
    }

    #choiceLayer {
      position: absolute;
      inset: 0;
      display: none;
      z-index: 20;
    }

    .choiceZone {
      position: absolute;
      left: 0;
      width: 100%;
      height: 25%;
      cursor: pointer;
      background: transparent;
      border: none;
      padding: 0;
      margin: 0;
    }

    .choiceZone:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    #choiceA { top: 0%; }
    #choiceB { top: 25%; }
    #choiceC { top: 50%; }
    #choiceD { top: 75%; }


    #cornerButton {
      position: absolute;
      right: 0;
      bottom: 0;
      width: 25vw;
      height: 25vh;
      z-index: 25;
      display: none;
      cursor: pointer;
      background: transparent;
      border: none;
      padding: 0;
      margin: 0;
      opacity: 0;
    }

    #cornerButton:focus {
      outline: none;
    }

    #status {
      position: absolute;
      left: 18px;
      bottom: 18px;
      z-index: 30;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.4;
      pointer-events: none;
    }

    #hint {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      background: rgba(0, 0, 0, 0.7);
      padding: 12px 18px;
      border-radius: 999px;
      font-size: 16px;
      display: none;
      pointer-events: none;
      text-align: center;
      max-width: calc(100vw - 32px);
    }

    #startOverlay {
      position: absolute;
      inset: 0;
      display: none;
      z-index: 40;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.72);
      text-align: center;
      padding: 24px;
    }

    #startButton, #restartBtn {
      padding: 12px 20px;
      border-radius: 999px;
      border: 0;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
    }

    #resultScreen {
      position: absolute;
      inset: 0;
      z-index: 50;
      display: none;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.92);
      padding: 24px;
      text-align: center;
    }

    #resultCard {
      max-width: 720px;
      width: 100%;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 24px;
      padding: 32px;
      background: rgba(255,255,255,.06);
      box-shadow: 0 20px 80px rgba(0,0,0,.45);
    }

    #resultCard h1 { margin: 0 0 10px; font-size: 42px; }
    #resultCard h2 { margin: 0 0 18px; font-size: 26px; opacity: .9; }
    #resultCard p { font-size: 18px; line-height: 1.5; opacity: .9; }
  </style>
</head>
<body>
  <main id="app">
    <div id="playerContainer"></div>

    <div id="choiceLayer" aria-label="Invisible video choice buttons">
      <button id="choiceA" class="choiceZone" aria-label="Choice A: Secure"></button>
      <button id="choiceB" class="choiceZone" aria-label="Choice B: Anxious"></button>
      <button id="choiceC" class="choiceZone" aria-label="Choice C: Dismissive"></button>
      <button id="choiceD" class="choiceZone" aria-label="Choice D: Fearful"></button>
    </div>

    <button id="cornerButton" aria-label="Continue or restart"></button>


    <div id="status">
      Question <span id="questionNumber">1</span> / <span id="questionTotal">5</span><br>
      Anxiety: <span id="anxietyScore">0</span> | Avoidance: <span id="avoidanceScore">0</span>
    </div>

    <div id="hint">Choose by clicking the video: top = A, second = B, third = C, bottom = D</div>

    <div id="startOverlay">
      <div>
        <p>Click start to begin the interactive video with sound.</p>
        <button id="startButton">Start</button>
      </div>
    </div>

    <section id="resultScreen">
      <div id="resultCard">
        <h1 id="resultStyle"></h1>
        <h2 id="resultPersona"></h2>
        <p id="resultDetails"></p>
        <button id="restartBtn">Restart</button>
      </div>
    </section>
  </main>

  <!-- Required for Cloudflare Stream iframe player events such as ended/play/pause. -->
  <script src="https://embed.cloudflarestream.com/embed/sdk.latest.js"></script>

  <script>
    /**************************************************************
     * IMPORTANT
     * This version is for Cloudflare Stream iframe URLs.
     * Use the /iframe URL, NOT the /watch URL.
     * Example:
     * https://customer-xxxx.cloudflarestream.com/VIDEO_UID/iframe
     **************************************************************/

    const videos = [
      {
        id: "intro",
        type: "intro",
        embedSrc: "https://customer-cpwq0pj4qnpycdbg.cloudflarestream.com/7401a9142e7af16f79611b87e1747fb8/iframe?poster=https%3A%2F%2Fcustomer-cpwq0pj4qnpycdbg.cloudflarestream.com%2F7401a9142e7af16f79611b87e1747fb8%2Fthumbnails%2Fthumbnail.jpg%3Ftime%3D%26height%3D600",
        next: "choice1"
      },
      {
        id: "choice1",
        type: "choice",
        embedSrc: "https://customer-cpwq0pj4qnpycdbg.cloudflarestream.com/171a12e2b2e253e7a27719ba5c42596d/iframe?poster=https%3A%2F%2Fcustomer-cpwq0pj4qnpycdbg.cloudflarestream.com%2F171a12e2b2e253e7a27719ba5c42596d%2Fthumbnails%2Fthumbnail.jpg%3Ftime%3D%26height%3D600",
        next: "choice2"
      },
      {
        id: "choice2",
        type: "choice",
        embedSrc: "https://customer-cpwq0pj4qnpycdbg.cloudflarestream.com/5419c5fa8f7e2e8d01b80f39b562d9cb/iframe?poster=https%3A%2F%2Fcustomer-cpwq0pj4qnpycdbg.cloudflarestream.com%2F5419c5fa8f7e2e8d01b80f39b562d9cb%2Fthumbnails%2Fthumbnail.jpg%3Ftime%3D%26height%3D600",
        next: "choice3"
      },
      {
        id: "choice3",
        type: "choice",
        embedSrc: "https://customer-cpwq0pj4qnpycdbg.cloudflarestream.com/47890e1f124b620117128d8c68c6e2f2/iframe?poster=https%3A%2F%2Fcustomer-cpwq0pj4qnpycdbg.cloudflarestream.com%2F47890e1f124b620117128d8c68c6e2f2%2Fthumbnails%2Fthumbnail.jpg%3Ftime%3D%26height%3D600",
        next: "choice4"
      },
      {
        id: "choice4",
        type: "choice",
        embedSrc: "https://customer-cpwq0pj4qnpycdbg.cloudflarestream.com/8c17cd24d0a71ce8bdcff33631cdae86/iframe?poster=https%3A%2F%2Fcustomer-cpwq0pj4qnpycdbg.cloudflarestream.com%2F8c17cd24d0a71ce8bdcff33631cdae86%2Fthumbnails%2Fthumbnail.jpg%3Ftime%3D%26height%3D600",
        next: "choice5"
      },
      {
        id: "choice5",
        type: "choice",
        embedSrc: "https://customer-cpwq0pj4qnpycdbg.cloudflarestream.com/d3aabbc4b9d9ed4192c0208276dae8b3/iframe?poster=https%3A%2F%2Fcustomer-cpwq0pj4qnpycdbg.cloudflarestream.com%2Fd3aabbc4b9d9ed4192c0208276dae8b3%2Fthumbnails%2Fthumbnail.jpg%3Ftime%3D%26height%3D600",
        nextByResult: {
          Secure: "resultSecure",
          Anxious: "resultAnxious",
          Dismissive: "resultDismissive",
          Fearful: "resultFearful"
        }
      },
      {
        id: "resultSecure",
        type: "result",
        embedSrc: "https://customer-cpwq0pj4qnpycdbg.cloudflarestream.com/6960edd747f2bd209fef7bd5ba1791d1/iframe?poster=https%3A%2F%2Fcustomer-cpwq0pj4qnpycdbg.cloudflarestream.com%2F6960edd747f2bd209fef7bd5ba1791d1%2Fthumbnails%2Fthumbnail.jpg%3Ftime%3D%26height%3D600"
      },
      {
        id: "resultAnxious",
        type: "result",
        embedSrc: "https://customer-cpwq0pj4qnpycdbg.cloudflarestream.com/5a99ce11afea19c0a8983a6c9173686c/iframe?poster=https%3A%2F%2Fcustomer-cpwq0pj4qnpycdbg.cloudflarestream.com%2F5a99ce11afea19c0a8983a6c9173686c%2Fthumbnails%2Fthumbnail.jpg%3Ftime%3D%26height%3D600"
      },
      {
        id: "resultDismissive",
        type: "result",
        embedSrc: "https://customer-cpwq0pj4qnpycdbg.cloudflarestream.com/1552b92c55e5dbcdfe54629b445b0bfe/iframe?poster=https%3A%2F%2Fcustomer-cpwq0pj4qnpycdbg.cloudflarestream.com%2F1552b92c55e5dbcdfe54629b445b0bfe%2Fthumbnails%2Fthumbnail.jpg%3Ftime%3D%26height%3D600"
      },
      {
        id: "resultFearful",
        type: "result",
        embedSrc: "https://customer-cpwq0pj4qnpycdbg.cloudflarestream.com/3f9fcaec391400bfc970f53662ff7919/iframe?poster=https%3A%2F%2Fcustomer-cpwq0pj4qnpycdbg.cloudflarestream.com%2F3f9fcaec391400bfc970f53662ff7919%2Fthumbnails%2Fthumbnail.jpg%3Ftime%3D%26height%3D600"
      }
    ];

    const choiceScores = {
      A: { label: "Secure", anxiety: 0, avoidance: 0 },
      B: { label: "Anxious", anxiety: 1, avoidance: 0 },
      C: { label: "Dismissive", anxiety: 0, avoidance: 1 },
      D: { label: "Fearful", anxiety: 1, avoidance: 1 }
    };

    const finalResults = [
      {
        condition: scores => scores.anxiety <= 2 && scores.avoidance <= 2,
        style: "Secure",
        persona: "The Reliable Navigator"
      },
      {
        condition: scores => scores.anxiety >= 3 && scores.avoidance <= 2,
        style: "Anxious",
        persona: "The Devoted Sidekick"
      },
      {
        condition: scores => scores.anxiety <= 2 && scores.avoidance >= 3,
        style: "Dismissive",
        persona: "The Solo Ranger"
      },
      {
        condition: scores => scores.anxiety >= 3 && scores.avoidance >= 3,
        style: "Fearful",
        persona: "The Haunted Explorer"
      }
    ];

    const videoMap = Object.fromEntries(videos.map(video => [video.id, video]));
    const playerContainer = document.getElementById("playerContainer");
    const choiceLayer = document.getElementById("choiceLayer");
    const cornerButton = document.getElementById("cornerButton");
    const hint = document.getElementById("hint");
    const resultScreen = document.getElementById("resultScreen");
    const status = document.getElementById("status");
    const startOverlay = document.getElementById("startOverlay");

    let currentVideoId = "intro";
    let currentPlayer = null;
    let progressTimer = null;
    let choiceLayerActive = false;
    let cornerButtonActive = false;
    let anxiety = 0;
    let avoidance = 0;
    let questionNumber = 1;
    const totalQuestions = 5;
    const SHOW_CHOICES_SECONDS_BEFORE_END = 30;

    document.getElementById("questionTotal").textContent = totalQuestions;

    function addCloudflareParams(url) {
      const separator = url.includes("?") ? "&" : "?";
      return `${url}${separator}autoplay=true&muted=false&controls=false`;
    }

    function getFinalResult() {
      const scores = { anxiety, avoidance };
      return finalResults.find(item => item.condition(scores));
    }


    function showCornerButton() {
      cornerButtonActive = true;
      cornerButton.style.display = "block";
    }

    function hideCornerButton() {
      cornerButtonActive = false;
      cornerButton.style.display = "none";
    }

    function showChoiceLayer() {
      choiceLayerActive = true;
      choiceLayer.style.display = "block";
      hint.style.display = "block";
    }

    function hideChoiceLayer() {
      choiceLayerActive = false;
      choiceLayer.style.display = "none";
      hint.style.display = "none";
    }

    function stopProgressTimer() {
      if (progressTimer) {
        clearInterval(progressTimer);
        progressTimer = null;
      }
    }

    async function getPlayerNumber(propertyName) {
      if (!currentPlayer) return NaN;
      try {
        const value = currentPlayer[propertyName];
        const resolvedValue = typeof value?.then === "function" ? await value : value;
        return Number(resolvedValue);
      } catch (error) {
        return NaN;
      }
    }

    function startChoiceCountdownWatcher() {
      stopProgressTimer();

      progressTimer = setInterval(async () => {
        const current = videoMap[currentVideoId];
        if (!current || current.type !== "choice" || choiceLayerActive) return;

        const duration = await getPlayerNumber("duration");
        const currentTime = await getPlayerNumber("currentTime");

        if (!Number.isFinite(duration) || !Number.isFinite(currentTime) || duration <= 0) return;

        const secondsLeft = duration - currentTime;
        if (secondsLeft <= SHOW_CHOICES_SECONDS_BEFORE_END) {
          showChoiceLayer();
        }
      }, 500);
    }

    function updateStatus() {
      const current = videoMap[currentVideoId];

      if (!current || current.type !== "choice") {
        status.style.display = "none";
        return;
      }

      status.style.display = "block";
      document.getElementById("questionNumber").textContent = questionNumber;
      document.getElementById("anxietyScore").textContent = anxiety;
      document.getElementById("avoidanceScore").textContent = avoidance;
    }

    function handleVideoEnded() {
      const current = videoMap[currentVideoId];
      if (!current) return;

      stopProgressTimer();

      // Do not auto-transfer when any video ends.
      // Intro/result videos wait for the lower-right invisible button.
      // Choice videos wait for one of the four invisible choice zones.
      if (current.type === "intro" || current.type === "result") {
        showCornerButton();
        return;
      }

      if (current.type === "choice") {
        showChoiceLayer();
      }
    }

    function playVideo(videoId) {
      const videoData = videoMap[videoId];

      if (!videoData) {
        console.error("Missing video ID:", videoId);
        showFinalResult();
        return;
      }

      currentVideoId = videoId;
      stopProgressTimer();
      hideChoiceLayer();
      hideCornerButton();
      resultScreen.style.display = "none";
      startOverlay.style.display = "none";

      playerContainer.innerHTML = "";

      const iframe = document.createElement("iframe");
      iframe.id = "streamPlayer";
      iframe.src = addCloudflareParams(videoData.embedSrc);
      iframe.allow = "accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture; fullscreen";
      iframe.allowFullscreen = true;

      playerContainer.appendChild(iframe);

      currentPlayer = Stream(iframe);
      currentPlayer.muted = false;
      currentPlayer.volume = 1;
      currentPlayer.addEventListener("ended", handleVideoEnded);

      if (videoData.type === "choice") {
        startChoiceCountdownWatcher();
      }

      currentPlayer.play().catch(() => {
        startOverlay.style.display = "flex";
      });

      updateStatus();
    }

    function choose(choiceLetter) {
      const current = videoMap[currentVideoId];
      if (!choiceLayerActive || !current || current.type !== "choice") return;

      stopProgressTimer();
      hideChoiceLayer();

      anxiety += choiceScores[choiceLetter].anxiety;
      avoidance += choiceScores[choiceLetter].avoidance;

      if (current.nextByResult) {
        const result = getFinalResult();
        const resultVideoId = current.nextByResult[result.style];
        playVideo(resultVideoId);
        return;
      }

      questionNumber++;
      playVideo(current.next);
    }

    function showFinalResult() {
      const result = getFinalResult();

      if (currentPlayer) {
        currentPlayer.pause();
      }

      hideChoiceLayer();
      hideCornerButton();
      status.style.display = "none";
      resultScreen.style.display = "flex";

      document.getElementById("resultStyle").textContent = result.style;
      document.getElementById("resultPersona").textContent = result.persona;
      document.getElementById("resultDetails").textContent =
        `Final score: Anxiety ${anxiety}, Avoidance ${avoidance}. Your choices created this ending based on the scoring table.`;
    }


    cornerButton.addEventListener("click", () => {
      const current = videoMap[currentVideoId];
      if (!cornerButtonActive || !current) return;

      if (current.type === "intro") {
        playVideo(current.next || "choice1");
        return;
      }

      if (current.type === "result") {
        anxiety = 0;
        avoidance = 0;
        questionNumber = 1;
        currentVideoId = "intro";
        playVideo(currentVideoId);
      }
    });

    document.getElementById("choiceA").addEventListener("click", () => choose("A"));
    document.getElementById("choiceB").addEventListener("click", () => choose("B"));
    document.getElementById("choiceC").addEventListener("click", () => choose("C"));
    document.getElementById("choiceD").addEventListener("click", () => choose("D"));

    document.getElementById("startButton").addEventListener("click", () => {
      startOverlay.style.display = "none";
      if (currentPlayer) {
        currentPlayer.muted = false;
        currentPlayer.volume = 1;
        currentPlayer.play().catch(() => {
          startOverlay.style.display = "flex";
        });
      } else {
        playVideo(currentVideoId);
      }
    });

    document.getElementById("restartBtn").addEventListener("click", () => {
      anxiety = 0;
      avoidance = 0;
      questionNumber = 1;
      currentVideoId = "intro";
      playVideo(currentVideoId);
    });

    window.addEventListener("load", () => {
      playVideo(currentVideoId);
    });
  </script>
</body>
</html>
