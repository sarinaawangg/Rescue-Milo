<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Video Choice Game</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #050505;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }
    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      background: black;
    }
    video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      background: black;
    }
    #choiceLayer {
      position: absolute;
      inset: 0;
      display: none;
      z-index: 10;
    }
    .choiceZone {
      position: absolute;
      left: 0;
      width: 100%;
      height: 25%;
      cursor: pointer;
      background: transparent;
      border: none;
      padding: 0;
      margin: 0;
    }
    .choiceZone:hover {
      background: rgba(255, 255, 255, 0.06);
    }
    #choiceA { top: 0%; }
    #choiceB { top: 25%; }
    #choiceC { top: 50%; }
    #choiceD { top: 75%; }

    #status {
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 20;
      background: rgba(0, 0, 0, 0.45);
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.4;
      pointer-events: none;
    }
    #hint {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      background: rgba(0, 0, 0, 0.6);
      padding: 12px 18px;
      border-radius: 999px;
      font-size: 16px;
      display: none;
      pointer-events: none;
      text-align: center;
    }
    #resultScreen {
      position: absolute;
      inset: 0;
      z-index: 30;
      display: none;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.92);
      padding: 24px;
      text-align: center;
    }
    #resultCard {
      max-width: 720px;
      width: 100%;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 24px;
      padding: 32px;
      background: rgba(255,255,255,.06);
      box-shadow: 0 20px 80px rgba(0,0,0,.45);
    }
    #resultCard h1 { margin: 0 0 10px; font-size: 42px; }
    #resultCard h2 { margin: 0 0 18px; font-size: 26px; opacity: .9; }
    #resultCard p { font-size: 18px; line-height: 1.5; opacity: .9; }
    #restartBtn {
      margin-top: 18px;
      padding: 12px 18px;
      border-radius: 999px;
      border: 0;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <main id="app">
    <video id="mainVideo" autoplay playsinline></video>

    <div id="choiceLayer" aria-label="Invisible video choice buttons">
      <button id="choiceA" class="choiceZone" aria-label="Choice A: Secure"></button>
      <button id="choiceB" class="choiceZone" aria-label="Choice B: Anxious"></button>
      <button id="choiceC" class="choiceZone" aria-label="Choice C: Dismissive"></button>
      <button id="choiceD" class="choiceZone" aria-label="Choice D: Fearful"></button>
    </div>

    <div id="status">Question <span id="questionNumber">1</span> / <span id="questionTotal">5</span><br>Anxiety: <span id="anxietyScore">0</span> | Avoidance: <span id="avoidanceScore">0</span></div>
    <div id="hint">Choose by clicking the video: top = A, second = B, third = C, bottom = D</div>

    <section id="resultScreen">
      <div id="resultCard">
        <h1 id="resultStyle"></h1>
        <h2 id="resultPersona"></h2>
        <p id="resultDetails"></p>
        <button id="restartBtn">Restart</button>
      </div>
    </section>
  </main>

  <script>
    /**************************************************************
     * HOW TO USE
     * 1. Replace the placeholder video URLs below with your own files.
     *    Example: "videos/intro.mp4" or a direct .mp4 link.
     * 2. Structure:
     *    - 1 intro video
     *    - 5 choice videos, played in order no matter which choice is clicked
     *    - after the 5th choice, the site calculates the final result
     *    - then it plays 1 of 4 result videos
     * 3. Invisible click zones appear only after each choice video ends.
     *    A = top quarter = Secure
     *    B = second quarter = Anxious
     *    C = third quarter = Dismissive
     *    D = bottom quarter = Fearful
     **************************************************************/

    const videos = [
      {
        id: "intro",
        type: "intro",
        src: "https://customer-cpwq0pj4qnpycdbg.cloudflarestream.com/7401a9142e7af16f79611b87e1747fb8/iframe?poster=https%3A%2F%2Fcustomer-cpwq0pj4qnpycdbg.cloudflarestream.com%2F7401a9142e7af16f79611b87e1747fb8%2Fthumbnails%2Fthumbnail.jpg%3Ftime%3D%26height%3D600",
        next: "choice1"
      },
      {
        id: "choice1",
        type: "choice",
        src: "https://customer-cpwq0pj4qnpycdbg.cloudflarestream.com/171a12e2b2e253e7a27719ba5c42596d/iframe?poster=https%3A%2F%2Fcustomer-cpwq0pj4qnpycdbg.cloudflarestream.com%2F171a12e2b2e253e7a27719ba5c42596d%2Fthumbnails%2Fthumbnail.jpg%3Ftime%3D%26height%3D600",
        next: "choice2"
      },
      {
        id: "choice2",
        type: "choice",
        src: "https://customer-cpwq0pj4qnpycdbg.cloudflarestream.com/5419c5fa8f7e2e8d01b80f39b562d9cb/iframe?poster=https%3A%2F%2Fcustomer-cpwq0pj4qnpycdbg.cloudflarestream.com%2F5419c5fa8f7e2e8d01b80f39b562d9cb%2Fthumbnails%2Fthumbnail.jpg%3Ftime%3D%26height%3D600",
        next: "choice3"
      },
      {
        id: "choice3",
        type: "choice",
        src: "https://customer-cpwq0pj4qnpycdbg.cloudflarestream.com/47890e1f124b620117128d8c68c6e2f2/iframe?poster=https%3A%2F%2Fcustomer-cpwq0pj4qnpycdbg.cloudflarestream.com%2F47890e1f124b620117128d8c68c6e2f2%2Fthumbnails%2Fthumbnail.jpg%3Ftime%3D%26height%3D600",
        next: "choice4"
      },
      {
        id: "choice4",
        type: "choice",
        src: "https://customer-cpwq0pj4qnpycdbg.cloudflarestream.com/8c17cd24d0a71ce8bdcff33631cdae86/iframe?poster=https%3A%2F%2Fcustomer-cpwq0pj4qnpycdbg.cloudflarestream.com%2F8c17cd24d0a71ce8bdcff33631cdae86%2Fthumbnails%2Fthumbnail.jpg%3Ftime%3D%26height%3D600",
        next: "choice5"
      },
      {
        id: "choice5",
        type: "choice",
        src: "https://customer-cpwq0pj4qnpycdbg.cloudflarestream.com/d3aabbc4b9d9ed4192c0208276dae8b3/iframe?poster=https%3A%2F%2Fcustomer-cpwq0pj4qnpycdbg.cloudflarestream.com%2Fd3aabbc4b9d9ed4192c0208276dae8b3%2Fthumbnails%2Fthumbnail.jpg%3Ftime%3D%26height%3D600",
        nextByResult: {
          Secure: "resultSecure",
          Anxious: "resultAnxious",
          Dismissive: "resultDismissive",
          Fearful: "resultFearful"
        }
      },
      {
        id: "resultSecure",
        type: "result",
        src: "https://customer-cpwq0pj4qnpycdbg.cloudflarestream.com/6960edd747f2bd209fef7bd5ba1791d1/iframe?poster=https%3A%2F%2Fcustomer-cpwq0pj4qnpycdbg.cloudflarestream.com%2F6960edd747f2bd209fef7bd5ba1791d1%2Fthumbnails%2Fthumbnail.jpg%3Ftime%3D%26height%3D600"
      },
      {
        id: "resultAnxious",
        type: "result",
        src: "https://customer-cpwq0pj4qnpycdbg.cloudflarestream.com/5a99ce11afea19c0a8983a6c9173686c/iframe?poster=https%3A%2F%2Fcustomer-cpwq0pj4qnpycdbg.cloudflarestream.com%2F5a99ce11afea19c0a8983a6c9173686c%2Fthumbnails%2Fthumbnail.jpg%3Ftime%3D%26height%3D600"
      },
      {
        id: "resultDismissive",
        type: "result",
        src: "https://customer-cpwq0pj4qnpycdbg.cloudflarestream.com/1552b92c55e5dbcdfe54629b445b0bfe/iframe?poster=https%3A%2F%2Fcustomer-cpwq0pj4qnpycdbg.cloudflarestream.com%2F1552b92c55e5dbcdfe54629b445b0bfe%2Fthumbnails%2Fthumbnail.jpg%3Ftime%3D%26height%3D600"
      },
      {
        id: "resultFearful",
        type: "result",
        src: "https://customer-cpwq0pj4qnpycdbg.cloudflarestream.com/3f9fcaec391400bfc970f53662ff7919/iframe?poster=https%3A%2F%2Fcustomer-cpwq0pj4qnpycdbg.cloudflarestream.com%2F3f9fcaec391400bfc970f53662ff7919%2Fthumbnails%2Fthumbnail.jpg%3Ftime%3D%26height%3D600"
      }
    ];

    const choiceScores = {
      A: { label: "Secure", anxiety: 0, avoidance: 0 },
      B: { label: "Anxious", anxiety: 1, avoidance: 0 },
      C: { label: "Dismissive", anxiety: 0, avoidance: 1 },
      D: { label: "Fearful", anxiety: 1, avoidance: 1 }
    };

    const finalResults = [
      {
        condition: scores => scores.anxiety <= 2 && scores.avoidance <= 2,
        style: "Secure",
        persona: "The Reliable Navigator"
      },
      {
        condition: scores => scores.anxiety >= 3 && scores.avoidance <= 2,
        style: "Anxious",
        persona: "The Devoted Sidekick"
      },
      {
        condition: scores => scores.anxiety <= 2 && scores.avoidance >= 3,
        style: "Dismissive",
        persona: "The Solo Ranger"
      },
      {
        condition: scores => scores.anxiety >= 3 && scores.avoidance >= 3,
        style: "Fearful",
        persona: "The Haunted Explorer"
      }
    ];

    const videoMap = Object.fromEntries(videos.map(video => [video.id, video]));
    const mainVideo = document.getElementById("mainVideo");
    const choiceLayer = document.getElementById("choiceLayer");
    const hint = document.getElementById("hint");
    const resultScreen = document.getElementById("resultScreen");
    const status = document.getElementById("status");

    let currentVideoId = "intro";
    let anxiety = 0;
    let avoidance = 0;
    let questionNumber = 1;
    const totalQuestions = 5;

    document.getElementById("questionTotal").textContent = totalQuestions;

    function getFinalResult() {
      const scores = { anxiety, avoidance };
      return finalResults.find(item => item.condition(scores));
    }

    function updateStatus() {
      const current = videoMap[currentVideoId];

      if (!current || current.type !== "choice") {
        status.style.display = "none";
        return;
      }

      status.style.display = "block";
      document.getElementById("questionNumber").textContent = questionNumber;
      document.getElementById("anxietyScore").textContent = anxiety;
      document.getElementById("avoidanceScore").textContent = avoidance;
    }

    function playVideo(videoId) {
      const videoData = videoMap[videoId];
      if (!videoData) {
        console.error("Missing video ID:", videoId);
        showFinalResult();
        return;
      }

      currentVideoId = videoId;
      choiceLayer.style.display = "none";
      hint.style.display = "none";
      resultScreen.style.display = "none";

      mainVideo.src = videoData.src;
      mainVideo.currentTime = 0;
      mainVideo.muted = false;
      mainVideo.play().catch(() => {
        mainVideo.muted = true;
        mainVideo.play();
      });

      updateStatus();
    }

    mainVideo.addEventListener("ended", () => {
      const current = videoMap[currentVideoId];
      if (!current) return;

      if (current.type === "intro") {
        playVideo(current.next);
        return;
      }

      if (current.type === "choice") {
        choiceLayer.style.display = "block";
        hint.style.display = "block";
        return;
      }

      if (current.type === "result") {
        showFinalResult();
      }
    });

    function choose(choiceLetter) {
      const current = videoMap[currentVideoId];
      if (!current || current.type !== "choice") return;

      anxiety += choiceScores[choiceLetter].anxiety;
      avoidance += choiceScores[choiceLetter].avoidance;

      if (current.nextByResult) {
        const result = getFinalResult();
        const resultVideoId = current.nextByResult[result.style];
        playVideo(resultVideoId);
        return;
      }

      questionNumber++;
      playVideo(current.next);
    }

    document.getElementById("choiceA").addEventListener("click", () => choose("A"));
    document.getElementById("choiceB").addEventListener("click", () => choose("B"));
    document.getElementById("choiceC").addEventListener("click", () => choose("C"));
    document.getElementById("choiceD").addEventListener("click", () => choose("D"));

    function showFinalResult() {
      const result = getFinalResult();

      mainVideo.pause();
      choiceLayer.style.display = "none";
      hint.style.display = "none";
      status.style.display = "none";
      resultScreen.style.display = "flex";

      document.getElementById("resultStyle").textContent = result.style;
      document.getElementById("resultPersona").textContent = result.persona;
      document.getElementById("resultDetails").textContent =
        `Final score: Anxiety ${anxiety}, Avoidance ${avoidance}. Your choices created this ending based on the scoring table.`;
    }

    document.getElementById("restartBtn").addEventListener("click", () => {
      anxiety = 0;
      avoidance = 0;
      questionNumber = 1;
      playVideo("intro");
    });

    playVideo(currentVideoId);
  </script>
</body>
</html>
